# Syntax highlighting
"attribute" = "azure"
"type" = "azure"
"constructor" = "azure"
"constant" = "azure"
"string" = "green"
"comment" = { fg = "blue", modifiers = ["italic"] }
"variable" = "white"
"variable.parameter" = { fg = "white", modifiers = ["italic"] }
"variable.builtin" = "azure"
"keyword" = "azure"
"operator" = "azure"
"function" = "azure"
"namespace" = { fg = "azure", modifiers = ["italic"] }
"markup.heading" = "azure"

# UI
"ui.background" = { fg = "white", bg = "base" }
"ui.linenr" = { fg = "blue" }
"ui.statusline" = { fg = "white", bg = "mantle" }
"ui.text" = { fg = "white" }
"ui.text.focus" = { fg = "white", bg = "surface", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "blue" }
"ui.selection" = { fg = "base", bg = "azure" }
"ui.cursor" = { fg = "base", bg = "azure" }
"ui.virtual.inlay-hint" = { fg = "blue", modifiers = ["dim"] }
"ui.virtual.indent-guide" = "surface"
"ui.menu" = { fg = "white", bg = "surface" }
"ui.menu.selected" = { fg = "base", bg = "azure", modifiers = ["bold"] }
"ui.menu.focus" = { fg = "base", bg = "azure", modifiers = ["bold"] }

error = "red"
warning = "yellow"
info = "blue"
hint = "teal"

"diagnostic.error" = { fg = "red", modifiers = ["bold", "underlined"] }
"diagnostic.warning" = { fg = "yellow", modifiers = ["bold", "underlined"] }
"diagnostic.info" = { fg = "blue", modifiers = ["bold"] }
"diagnostic.hint" = { fg = "teal", modifiers = ["bold"] }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

[palette]
white = "#c0c0c0"
azure = "#6a9cd5"
blue = "#5d8aa8"
red = "#d46a7e"
yellow = "#d4c078"
teal = "#6ab8af"
green = "#7eb87d"
base = "#18181c"
mantle = "#1c1c21"
surface = "#252529"
