# General
theme = "azul"

[editor]
# Enable relative line numbers for context
line-number = "relative"
# Instant autocomplete
completion-timeout = 5
completion-trigger-len = 1
# Disable mouse support by default
mouse = false
# Show bufferline
bufferline = "always"
cursorline = true

# Cursor shapes per mode
[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

# File picker settings
[editor.file-picker]
hidden = false

# Soft wrap settings
[editor.soft-wrap]
enable = true
wrap-indicator = "↩ "

# Whitespace visualization
[editor.whitespace.render]
space = "all"
tab = "all"
newline = "none"

[editor.whitespace.characters]
space = " "
nbsp = "⍽"
tab = "→"
newline = "⏎"
tabpad = "·"

# Status line customization
[editor.statusline]
separator = "│"
mode.normal = "N"
mode.insert = "I"
mode.select = "S"

left = ["mode", "spinner", "file-name", "diagnostics"]
right = ["file-encoding", "file-type", "file-line-ending", "selections", "position"]

# Editor integrations
[editor.lsp]
display-inlay-hints = false
display-color-swatches = true

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[keys.normal]
H = "goto_previous_buffer"
L = "goto_next_buffer"
tab = "goto_last_accessed_file"
space.x = ":buffer-close"
space.i.f = ":fmt"
