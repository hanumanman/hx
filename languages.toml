[language-server.efm-lsp-prettier]
command = "efm-langserver"

[language-server.efm-lsp-prettier.config]
documentFormatting = true
languages = {
 typescript = [ { formatCommand ="prettier --stdin-filepath ${INPUT}", formatStdin = true } ] ,
 typescriptreact = [ { formatCommand ="prettier --stdin-filepath ${INPUT}", formatStdin = true } ],
 javascript = [ { formatCommand ="prettier --stdin-filepath ${INPUT}", formatStdin = true } ],
 javascriptreact = [ { formatCommand ="prettier --stdin-filepath ${INPUT}", formatStdin = true } ],
 }

[language-server.vscode-eslint-language-server]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[language-server.vscode-eslint-language-server.config]
format = true
nodePath = ""
onIgnoredFiles = "off"
packageManager = "npm"
quiet = false
rulesCustomizations = []
run = "onType"
useESLintClass = false
validate = "on"
codeAction = { disableRuleComment = { enable = true, location = "separateLine" }, showDocumentation = { enable = true } }
codeActionOnSave = { mode = "all" }
experimental = { }
problems = { shortenToSingleLine = false }
workingDirectory = { mode = "auto" }

[language-server.tailwindcss-ls]
command = "tailwindcss-language-server"
args = ["--stdio"]

[[language]]
name = "html"
language-servers = ["tailwindcss-ls", "vscode-html-language-server"]

[[language]]
name = "jsx"
language-servers = ["tailwindcss-ls", "typescript-language-server", "vscode-eslint-language-server"]

[[language]]
name = "tsx"
language-servers = [
  "tailwindcss-ls",
  { name = "typescript-language-server", except-features = ["format"] },
  { name = "efm-lsp-prettier", only-features = ["format"] },
  "vscode-eslint-language-server"
]

[[language]]
name = "typescript"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  { name = "efm-lsp-prettier", only-features = ["format"] },
  "vscode-eslint-language-server"
]

[[language]]
name = "javascript"
language-servers = [
  { name = "typescript-language-server", except-features = ["format"] },
  { name = "efm-lsp-prettier", only-features = ["format"] },
  "vscode-eslint-language-server"
]

[language-server.ruff]
command = "ruff"
args = ["server"]

[[language]]
name = "python"
formatter = { command = "ruff", args = ["format", "-"] }
auto-format = false
